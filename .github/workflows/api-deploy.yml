name: api-deploy

# Manual trigger only. Builds the API image, pushes to ECR, injects the DB
# secret + Cognito config, and rolls the ECS service.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build --if-present
      - run: npm test --if-present

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, push, and deploy
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          NAME: starshipos-${{ inputs.environment }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE="$REGISTRY/$NAME-api:$IMAGE_TAG"
          docker build -t "$IMAGE" services/api
          docker push "$IMAGE"

          # Look up the DB secret and Cognito ids for this environment.
          SECRET_ARN=$(aws secretsmanager describe-secret --secret-id "$NAME/db-credentials" --query ARN --output text)
          POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 --query "UserPools[?Name=='$NAME-users'].Id | [0]" --output text)
          CLIENT_ID=$(aws cognito-idp list-user-pool-clients --user-pool-id "$POOL_ID" --query "UserPoolClients[?ClientName=='$NAME-web'].ClientId | [0]" --output text)
          echo "secret=$SECRET_ARN pool=$POOL_ID client=$CLIENT_ID"

          # File storage: uploads bucket + the app's public origin (used to build
          # durable file_urls). PUBLIC_BASE is the CloudFront domain for this env.
          UPLOADS_BUCKET="$NAME-uploads"
          if [ "${{ inputs.environment }}" = "prod" ]; then
            PUBLIC_BASE="https://os.starshipgroup.co.uk"
          else
            PUBLIC_BASE="https://d1w15g135zlze.cloudfront.net"
          fi

          TASKDEF=$(aws ecs describe-task-definition --task-definition "$NAME-api" --query 'taskDefinition' --output json)
          NEW=$(echo "$TASKDEF" | jq \
            --arg IMG "$IMAGE" --arg SECRET "$SECRET_ARN" --arg POOL "$POOL_ID" --arg CLIENT "$CLIENT_ID" \
            --arg UPLOADS "$UPLOADS_BUCKET" --arg PUBLICBASE "$PUBLIC_BASE" '
            .containerDefinitions[0].image = $IMG
            | .containerDefinitions[0].environment = [
                {name:"NODE_ENV",value:"production"},
                {name:"AWS_REGION",value:"eu-west-2"},
                {name:"COGNITO_USER_POOL_ID",value:$POOL},
                {name:"COGNITO_APP_CLIENT_ID",value:$CLIENT},
                {name:"CORS_ORIGIN",value:"*"},
                {name:"UPLOADS_BUCKET",value:$UPLOADS},
                {name:"PUBLIC_BASE_URL",value:$PUBLICBASE}
              ]
            | .containerDefinitions[0].secrets = [
                {name:"DB_HOST",valueFrom:($SECRET+":host::")},
                {name:"DB_PORT",valueFrom:($SECRET+":port::")},
                {name:"DB_USER",valueFrom:($SECRET+":username::")},
                {name:"DB_PASSWORD",valueFrom:($SECRET+":password::")},
                {name:"DB_NAME",valueFrom:($SECRET+":dbname::")}
              ]
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)')
          ARN=$(aws ecs register-task-definition --cli-input-json "$NEW" --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster "$NAME" --service "$NAME-api" --task-definition "$ARN" --force-new-deployment
          aws ecs wait services-stable --cluster "$NAME" --services "$NAME-api"
          echo "Deployed $IMAGE to $NAME."
